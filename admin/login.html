<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Admin — Nidly</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --terracotta: #C47B6B;
    --bark: #7A5C52;
    --charcoal: #2C2420;
    --dusty-rose: #D4A5A0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .login-box {
    background: white;
    border-radius: 1.5rem;
    padding: 3rem;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(122,92,82,0.12);
    border: 1px solid rgba(212,165,160,0.2);
  }
  .login-box h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 400;
    color: var(--charcoal);
    margin-bottom: 0.5rem;
  }
  .login-box h1 span { color: var(--terracotta); font-style: italic; }
  .login-box p { font-size: 0.85rem; color: var(--bark); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label {
    display: block;
    font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--bark); margin-bottom: 0.5rem;
  }
  .form-group input {
    width: 100%;
    padding: 0.9rem 1rem;
    border: 1.5px solid rgba(212,165,160,0.4);
    border-radius: 0.6rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--terracotta);
  }
  .btn-login {
    width: 100%;
    background: var(--terracotta);
    color: white;
    padding: 1rem;
    border: none;
    border-radius: 3rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
    transition: background 0.2s;
  }
  .btn-login:hover { background: var(--bark); }
  .error { color: #c47b6b; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>Ni<span>dly</span> Admin</h1>
  <p>Connectez-vous pour gérer les commandes</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="admin@nidly.dz" required>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <p class="error" id="error"></p>
    <button type="submit" class="btn-login">Se connecter</button>
  </form>
</div>

<script src="../js/config.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.email.value;
    const password = e.target.password.value;
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';

    try {
      const res = await fetch(API_URL + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('nidly_admin_token', data.token);
        window.location.href = 'orders.html';
      } else {
        errEl.textContent = data.message || 'Identifiants incorrects';
        errEl.style.display = 'block';
      }
    } catch (err) {
      errEl.textContent = 'Impossible de contacter le serveur. Démarrez le backend (voir GUIDE-BACKEND.md)';
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
