<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nidly - Bientôt disponible</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, sans-serif;
    background:#faf7f2;
    color:#2c2420;
}

.container{
    max-width:600px;
    padding:30px;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

span{
    color:#c47b6b;
}

p{
    font-size:1.1rem;
    line-height:1.8;
    color:#7a5c52;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 30px;
    background:#c47b6b;
    color:white;
    text-decoration:none;
    border-radius:999px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Revenez <span>plus tard</span></h1>

    <p>
        Le site est actuellement en cours de configuration.
        Nous finalisons les derniers détails et serons bientôt en ligne.
    </p>

    <a href="javascript:location.reload()" class="btn">
        Réessayer
    </a>
</div>

</body>
</html>
